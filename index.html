<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Kanban Board</title>
  </head>
  <body>
    <main>
      <nav class="nav">
        <div class="left">Kanban</div>
        <div class="right">
          <button id="toggle-modal">Add Task</button>
        </div>
      </nav>

      <section class="board">
        <div id="to-do" class="task-cloumn">
          <div class="heading">
            <div class="left">To Do</div>
            <div class="right">Count</div>
          </div>
          <div draggable="true" class="task">
            <h2>Task 1</h2>
            <p>Description of Task 1</p>
            <button>Delete</button>
          </div>
        </div>
        <div id="in-progress" class="task-cloumn">
          <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">Count</div>
          </div>
        </div>
        <div id="done" class="task-cloumn">
          <div class="heading">
            <div class="left">Done</div>
            <div class="right">Count</div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal add-new-task">
      <div class="bg">

      </div>
      <div class="center">
        <input id="task-title" type="text" placeholder="Task Title" />
        <textarea
          name="description"
          id="task-description"
          placeholder="Task Description"
        ></textarea>
        <button id="add-new-task" class="add-task-btn">Add Task</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
